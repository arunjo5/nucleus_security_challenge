<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #1e1e1e;
      --panel: #2a2a2a;
      --display: #111;
      --text: #eee;
      --muted: #9cdcfe;
      --err: #f48771;
      --btn: #3a3a3a;
      --btn-hover: #4a4a4a;
      --op: #4a3a2a;
      --op-hover: #5a4a3a;
      --eq: #2a5a3a;
      --eq-hover: #3a6a4a;
      --clear: #5a2a2a;
      --clear-hover: #6a3a3a;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }
    .calc {
      width: 100%;
      max-width: 340px;
      background: var(--panel);
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .display {
      width: 100%;
      padding: 14px;
      font-size: 20px;
      background: var(--display);
      color: var(--text);
      border: 1px solid #444;
      border-radius: 6px;
      text-align: right;
      margin-bottom: 6px;
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
    }
    .result {
      min-height: 24px;
      padding: 0 4px 10px;
      text-align: right;
      color: var(--muted);
      font-size: 15px;
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
    }
    .result.error { color: var(--err); }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    button {
      padding: 14px 0;
      font-size: 16px;
      background: var(--btn);
      color: var(--text);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 80ms ease;
    }
    button:hover { background: var(--btn-hover); }
    button:active { transform: translateY(1px); }
    button.op { background: var(--op); }
    button.op:hover { background: var(--op-hover); }
    button.eq { background: var(--eq); grid-column: span 2; }
    button.eq:hover { background: var(--eq-hover); }
    button.clear { background: var(--clear); }
    button.clear:hover { background: var(--clear-hover); }
  </style>
</head>
<body>
  <div class="calc">
    <input id="expr" class="display" type="text" placeholder="e.g. (2 + 3) * 4" autocomplete="off" autofocus>
    <div id="result" class="result" aria-live="polite"></div>
    <div class="grid">
      <button data-k="(">(</button>
      <button data-k=")">)</button>
      <button data-k="clear" class="clear">C</button>
      <button data-k="/" class="op">÷</button>

      <button data-k="7">7</button>
      <button data-k="8">8</button>
      <button data-k="9">9</button>
      <button data-k="*" class="op">×</button>

      <button data-k="4">4</button>
      <button data-k="5">5</button>
      <button data-k="6">6</button>
      <button data-k="-" class="op">−</button>

      <button data-k="1">1</button>
      <button data-k="2">2</button>
      <button data-k="3">3</button>
      <button data-k="+" class="op">+</button>

      <button data-k="0">0</button>
      <button data-k=".">.</button>
      <button data-k="=" class="eq">=</button>
    </div>
  </div>

  <script>
    const expr = document.getElementById("expr");
    const result = document.getElementById("result");

    function showResult(text, isError) {
      result.textContent = text;
      result.classList.toggle("error", Boolean(isError));
    }

    async function calculate() {
      const value = expr.value.trim();
      if (!value) {
        showResult("");
        return;
      }
      try {
        const res = await fetch("/calculate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ expression: value }),
        });
        const data = await res.json();
        if (!res.ok) {
          showResult(data.error || "error", true);
        } else {
          showResult(String(data.result));
        }
      } catch (e) {
        showResult("network error", true);
      }
    }

    document.querySelectorAll("button[data-k]").forEach(btn => {
      btn.addEventListener("click", () => {
        const k = btn.dataset.k;
        if (k === "=") { calculate(); return; }
        if (k === "clear") { expr.value = ""; showResult(""); return; }
        expr.value += k;
        expr.focus();
      });
    });

    expr.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        calculate();
      }
    });
  </script>
</body>
</html>
